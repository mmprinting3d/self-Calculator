<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Process Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .math-grid {
            display: grid;
            grid-template-columns: 2rem repeat(7, 3.5rem);
            gap: 0.25rem;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace;
        }
        .cell-input {
            width: 3.5rem;
            height: 3.5rem;
            text-align: center;
            font-size: 1.5rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            background-color: white;
        }
        .cell-input:focus {
            border-color: #3b82f6;
            outline: none;
            background-color: #f8fafc;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .carry-input {
            height: 2.2rem;
            font-size: 1rem;
            color: #ef4444;
            border-style: dashed;
            background-color: #fff1f2;
            /* Allow text to shrink slightly if multiple digits are entered */
            padding: 0 2px;
        }
        .symbol {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            font-weight: bold;
            color: #64748b;
        }
        .place-label {
            font-size: 0.55rem;
            font-weight: 800;
            text-align: center;
            color: #94a3b8;
            text-transform: uppercase;
            padding-bottom: 2px;
        }
        .border-line {
            grid-column: span 8;
            height: 4px;
            background-color: #334155;
            margin: 0.5rem 0;
            border-radius: 2px;
        }
        .fact-input {
            width: 5rem;
            height: 4rem;
            text-align: center;
            font-size: 1.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            outline: none;
            transition: all 0.2s;
        }
        .fact-input:focus {
            border-color: #6366f1;
            background-color: #f5f3ff;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl p-6 md:p-10 border border-slate-200">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 border-b pb-6 gap-6">
            <div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">MATH WORKSPACE</h1>
                <p class="text-slate-500 font-medium">No robot answers—just your brain!</p>
            </div>
            <nav class="flex bg-slate-100 p-1.5 rounded-xl gap-1">
                <button onclick="setMode('add')" id="btn-add" class="mode-btn bg-white shadow-sm text-blue-600 px-5 py-2.5 rounded-lg font-bold transition">Add/Sub</button>
                <button onclick="setMode('mul')" id="btn-mul" class="mode-btn text-slate-600 hover:bg-slate-200 px-5 py-2.5 rounded-lg font-bold transition">Multiplication</button>
                <button onclick="setMode('div')" id="btn-div" class="mode-btn text-slate-600 hover:bg-slate-200 px-5 py-2.5 rounded-lg font-bold transition">Division</button>
            </nav>
            <button onclick="clearAll()" class="text-slate-400 hover:text-red-500 transition-colors text-xs font-black uppercase tracking-widest">Clear Everything</button>
        </header>

        <!-- Addition/Subtraction -->
        <div id="view-add" class="workspace-view">
            <div class="math-grid" id="grid-add">
                <!-- Place Value Labels -->
                <div class="symbol"></div>
                <div class="place-label">Millions</div>
                <div class="place-label">H-thous</div>
                <div class="place-label">T-thous</div>
                <div class="place-label">Thous</div>
                <div class="place-label">Hundreds</div>
                <div class="place-label">Tens</div>
                <div class="place-label">Ones</div>

                <!-- Carry Row (multi-digit allowed) -->
                <div class="symbol text-xs text-red-400">C</div>
                <input type="number" class="cell-input carry-input multi-digit"><input type="number" class="cell-input carry-input multi-digit"><input type="number" class="cell-input carry-input multi-digit"><input type="number" class="cell-input carry-input multi-digit"><input type="number" class="cell-input carry-input multi-digit"><input type="number" class="cell-input carry-input multi-digit"><input type="number" class="cell-input carry-input multi-digit">
                
                <!-- Number 1 -->
                <div class="symbol"></div>
                <input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input">
                
                <!-- Number 2 -->
                <div class="symbol"><select class="bg-transparent outline-none cursor-pointer"><option>+</option><option>-</option></select></div>
                <input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input">
                
                <div class="border-line"></div>
                
                <!-- Result -->
                <div class="symbol">=</div>
                <input type="number" class="cell-input font-black text-blue-600"><input type="number" class="cell-input font-black text-blue-600"><input type="number" class="cell-input font-black text-blue-600"><input type="number" class="cell-input font-black text-blue-600"><input type="number" class="cell-input font-black text-blue-600"><input type="number" class="cell-input font-black text-blue-600"><input type="number" class="cell-input font-black text-blue-600">
            </div>
        </div>

        <!-- Multiplication -->
        <div id="view-mul" class="workspace-view hidden">
            <div class="math-grid" id="grid-mul">
                <!-- Carry Row (multi-digit allowed) -->
                <div class="symbol text-xs text-red-400">C</div>
                <input type="number" class="cell-input carry-input multi-digit"><input type="number" class="cell-input carry-input multi-digit"><input type="number" class="cell-input carry-input multi-digit"><input type="number" class="cell-input carry-input multi-digit"><input type="number" class="cell-input carry-input multi-digit"><input type="number" class="cell-input carry-input multi-digit"><input type="number" class="cell-input carry-input multi-digit">
                
                <div class="symbol"></div>
                <input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input">
                
                <div class="symbol">×</div>
                <input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input"><input type="number" class="cell-input">
                
                <div class="border-line"></div>
                
                <div class="symbol text-[10px] uppercase text-slate-400">Step 1</div>
                <input type="number" class="cell-input border-dashed"><input type="number" class="cell-input border-dashed"><input type="number" class="cell-input border-dashed"><input type="number" class="cell-input border-dashed"><input type="number" class="cell-input border-dashed"><input type="number" class="cell-input border-dashed"><input type="number" class="cell-input border-dashed">
                
                <div class="symbol text-[10px] uppercase text-slate-400">Step 2</div>
                <input type="number" class="cell-input border-dashed"><input type="number" class="cell-input border-dashed"><input type="number" class="cell-input border-dashed"><input type="number" class="cell-input border-dashed"><input type="number" class="cell-input border-dashed"><input type="number" class="cell-input border-dashed"><input type="number" class="cell-input border-dashed">

                <div class="symbol text-[10px] uppercase text-slate-400">Step 3</div>
                <input type="number" class="cell-input border-dashed"><input type="number" class="cell-input border-dashed"><input type="number" class="cell-input border-dashed"><input type="number" class="cell-input border-dashed"><input type="number" class="cell-input border-dashed"><input type="number" class="cell-input border-dashed"><input type="number" class="cell-input border-dashed">
                
                <div class="border-line"></div>

                <div class="symbol">Total</div>
                <input type="number" class="cell-input font-black text-green-600"><input type="number" class="cell-input font-black text-green-600"><input type="number" class="cell-input font-black text-green-600"><input type="number" class="cell-input font-black text-green-600"><input type="number" class="cell-input font-black text-green-600"><input type="number" class="cell-input font-black text-green-600"><input type="number" class="cell-input font-black text-green-600">
            </div>
        </div>

        <!-- Division (Fact Family Format) -->
        <div id="view-div" class="workspace-view hidden">
            <div class="flex flex-col items-center gap-12 py-10" id="grid-div">
                
                <!-- Division Statement -->
                <div class="flex flex-col items-center">
                    <p class="text-slate-400 font-bold uppercase tracking-widest text-xs mb-6">Division Statement</p>
                    <div class="flex items-center gap-4 text-3xl font-bold">
                        <input type="number" class="fact-input w-40 border-slate-300" placeholder="56">
                        <span class="text-slate-400">÷</span>
                        <input type="number" class="fact-input w-24 border-slate-300" placeholder="8">
                        <span class="text-slate-400">=</span>
                        <input type="number" class="fact-input w-24 border-blue-500 bg-blue-50 text-blue-700" placeholder="7">
                    </div>
                </div>

                <div class="w-full max-w-md h-px bg-slate-100 relative">
                    <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white px-4 text-slate-400 font-black text-[10px] tracking-tighter">IS THE SAME AS</span>
                </div>

                <!-- Multiplication Check -->
                <div class="flex flex-col items-center">
                    <p class="text-indigo-400 font-bold uppercase tracking-widest text-xs mb-6">Multiplication Check</p>
                    <div class="flex items-center gap-4 text-3xl font-bold">
                        <input type="number" class="fact-input w-24 border-indigo-200" placeholder="7">
                        <span class="text-slate-400">×</span>
                        <input type="number" class="fact-input w-24 border-indigo-200" placeholder="8">
                        <span class="text-slate-400">=</span>
                        <input type="number" class="fact-input w-40 border-indigo-400 bg-indigo-50 text-indigo-700" placeholder="56">
                    </div>
                </div>

            </div>
        </div>

        <footer class="mt-10 pt-8 border-t text-center text-slate-400 text-sm font-medium">
            Remember: $56 / 8 = 7$ is true because $7 \times 8 = 56$!
        </footer>
    </div>

    <script>
        function setMode(mode) {
            document.querySelectorAll('.workspace-view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.mode-btn').forEach(b => {
                b.classList.remove('bg-white', 'shadow-sm', 'text-blue-600');
                b.classList.add('text-slate-600', 'hover:bg-slate-200');
            });

            document.getElementById('view-' + mode).classList.remove('hidden');
            const activeBtn = document.getElementById('btn-' + mode);
            activeBtn.classList.add('bg-white', 'shadow-sm', 'text-blue-600');
            activeBtn.classList.remove('text-slate-600', 'hover:bg-slate-200');
        }

        function clearAll() {
            document.querySelectorAll('input').forEach(input => input.value = '');
        }

        // Handle Arrow Key Navigation and Digit Limits
        document.addEventListener('keydown', function(e) {
            const active = document.activeElement;
            if (active.tagName !== 'INPUT') return;

            const currentView = document.querySelector('.workspace-view:not(.hidden)');
            const inputs = Array.from(currentView.querySelectorAll('input'));
            const index = inputs.indexOf(active);

            if (index === -1) return;

            const isGrid = currentView.id === 'view-add' || currentView.id === 'view-mul';
            const rowSize = isGrid ? 7 : 0; 

            switch(e.key) {
                case 'ArrowLeft':
                    if (index > 0) inputs[index - 1].focus();
                    break;
                case 'ArrowRight':
                    if (index < inputs.length - 1) inputs[index + 1].focus();
                    break;
                case 'ArrowUp':
                    if (isGrid && index >= rowSize) {
                        inputs[index - rowSize].focus();
                    } else if (!isGrid && index > 2) {
                        inputs[index - 3].focus();
                    }
                    break;
                case 'ArrowDown':
                    if (isGrid && index + rowSize < inputs.length) {
                        inputs[index + rowSize].focus();
                    } else if (!isGrid && index <= 2) {
                        inputs[index + 3].focus();
                    }
                    break;
            }
        });

        // Restrict input to single digits for standard cells, but allow more for "Carry" row
        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('input', function() {
                // If it's a standard cell but NOT a multi-digit carry cell
                if (this.classList.contains('cell-input') && !this.classList.contains('multi-digit')) {
                     if (this.value.length > 1) this.value = this.value.slice(-1);
                } else if (this.classList.contains('multi-digit')) {
                    // Limit carry boxes to 2 digits just so they don't look messy
                    if (this.value.length > 2) this.value = this.value.slice(0, 2);
                }
            });
        });
    </script>
</body>
</html>
